<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Vault</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<style>
:root {
  --bg: #1a1a24;
  --surface: #242334;
  --border: #34314a;
  --text: #e6e4ed;
  --text2: #9391a8;
  --accent: #f0a860;
  --accent-dim: rgba(240, 168, 96, 0.14);
  --danger: #e0556a;
  --green: #5cb88d;
  --radius: 10px;
  --sidebar-w: 280px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  display: flex;
}
a { color: var(--accent); }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100%;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; z-index: 10; transition: transform .2s ease;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
  background: linear-gradient(180deg, rgba(240,168,96,0.06) 0%, transparent 100%);
}
.sidebar-header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); cursor: pointer;
  font-size: 13px; font-family: var(--font); transition: all .15s;
}
.btn:hover { background: #2d2b3e; }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #1a1a24; font-weight: 600; }
.btn-primary:hover { background: #f5b870; }
.btn-danger { background: transparent; border-color: var(--danger); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-icon { padding: 6px; background: transparent; border: none; color: var(--text2); cursor: pointer; border-radius: 4px; }
.btn-icon:hover { color: var(--text); background: #2d2b3e; }

#search-input {
  width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: var(--font); outline: none;
}
#search-input:focus { border-color: var(--accent); }
#search-input::placeholder { color: var(--text2); }

.sidebar-body { flex: 1; overflow-y: auto; padding: 8px 0; }
.sidebar-section { padding: 8px 16px 4px; }
.sidebar-section-title {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  color: var(--text2); letter-spacing: 0.5px; margin-bottom: 6px;
}
.tag-list { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 16px 8px; }
.tag {
  display: inline-block; padding: 3px 8px; border-radius: 12px;
  font-size: 12px; cursor: pointer; border: 1px solid var(--border);
  color: var(--text2); transition: all .12s; white-space: nowrap;
}
.tag:hover { color: var(--text); border-color: var(--text2); }
.tag.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

.note-list-item {
  padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent;
  transition: all .12s; display: flex; flex-direction: column; gap: 2px;
}
.note-list-item:hover { background: rgba(240,168,96,0.05); }
.note-list-item.active { background: rgba(240,168,96,0.08); border-left-color: var(--accent); }
.note-list-item .title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-list-item .meta { font-size: 11px; color: var(--text2); }
.note-list-item .select-cb { display: none; margin-right: 8px; accent-color: var(--accent); }
.selecting .note-list-item .select-cb { display: inline-block; }
.selecting .note-list-item { display: flex; align-items: center; flex-direction: row; }

.sidebar-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; font-size: 12px;
}

/* MAIN */
#main {
  flex: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden;
  position: relative; isolation: isolate;
}
.main-toolbar {
  display: flex; align-items: center; gap: 8px; padding: 10px 20px;
  border-bottom: 1px solid var(--border); min-height: 48px;
  background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%);
}
.main-toolbar .note-title {
  font-size: 16px; font-weight: 600; flex: 1; background: transparent;
  border: none; color: var(--text); outline: none; font-family: var(--font);
}
.main-toolbar .note-title:focus { border-bottom: 1px dashed var(--border); }
.main-toolbar .note-title::placeholder { color: var(--text2); }
#menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; }

.main-content {
  flex: 1; overflow-y: auto; padding: 24px 32px; max-width: 860px;
  position: relative; z-index: 0;
}

/* EDITOR */
#editor-area { display: none; flex: 1; flex-direction: column; }
#editor-area.active { display: flex; }
#editor-textarea {
  flex: 1; padding: 24px 32px; border: none; outline: none; resize: none;
  font-family: var(--mono); font-size: 14px; line-height: 1.6;
  background: var(--bg); color: var(--text);
}
#editor-textarea::placeholder { color: var(--text2); }
.editor-footer {
  display: flex; align-items: center; gap: 8px; padding: 8px 20px;
  border-top: 1px solid var(--border); background: var(--surface); font-size: 12px; color: var(--text2);
}
.editor-footer .save-indicator { margin-left: auto; font-size: 11px; color: var(--green); transition: opacity .2s; }

/* SIDEBAR BACKDROP */
#sidebar-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 49;
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
  display: flex; align-items: center; justify-content: center;
}
.modal-overlay.hidden { display: none; }
.modal {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 16px;
}
.modal h3 { font-size: 16px; }
.modal input, .modal textarea {
  width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: var(--font); outline: none;
}
.modal input:focus, .modal textarea:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

/* RENDERED CONTENT */
.rendered { line-height: 1.7; font-size: 15px; }
.rendered h1, .rendered h2, .rendered h3 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
.rendered h1 { font-size: 1.6em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.rendered h2 { font-size: 1.3em; }
.rendered h3 { font-size: 1.1em; }
.rendered p { margin-bottom: 0.8em; }
.rendered ul, .rendered ol { padding-left: 1.5em; margin-bottom: 0.8em; }
.rendered li { margin-bottom: 0.25em; }
.rendered blockquote {
  border-left: 3px solid var(--accent); padding: 4px 16px; margin: 12px 0;
  color: var(--text2); background: rgba(240,168,96,0.06); border-radius: 0 4px 4px 0;
}
.rendered code {
  font-family: var(--mono); font-size: 0.88em;
  background: rgba(240,168,96,0.08); padding: 1px 5px; border-radius: 4px;
}
.rendered pre {
  margin: 12px 0; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border);
}
.rendered pre code { background: #1e1d30; padding: 14px 16px; display: block; overflow-x: auto; }
.rendered table { border-collapse: collapse; width: 100%; margin: 12px 0; }
.rendered th, .rendered td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.rendered th { background: rgba(240,168,96,0.08); font-weight: 600; }
.rendered img { max-width: 100%; border-radius: 6px; margin: 8px 0; }
.rendered .video-wrap { position: relative; padding-bottom: 56.25%; margin: 12px 0; z-index: 0; }
.rendered .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; border-radius: var(--radius); z-index: 0; pointer-events: auto; }
.rendered .katex-display { margin: 12px 0; overflow-x: auto; }
.rendered hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

/* EMPTY STATE */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: var(--text2);
}
.empty-state .icon { font-size: 48px; opacity: 0.4; }
.empty-state p { font-size: 14px; }

/* TOAST */
#toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 10px 16px; border-radius: 8px; font-size: 13px; color: #fff;
  animation: slideIn .2s ease; max-width: 320px;
}
.toast.info { background: #6b5c9e; }
.toast.success { background: #5cb88d; }
.toast.error { background: #e0556a; }
@keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* TAGS INPUT */
.tags-input-wrap {
  display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); min-height: 36px;
}
.tags-input-wrap:focus-within { border-color: var(--accent); }
.tags-input-wrap .tag-item {
  display: inline-flex; align-items: center; gap: 2px; padding: 2px 8px;
  border-radius: 12px; font-size: 12px; background: var(--accent-dim);
  color: var(--accent); border: 1px solid var(--accent);
}
.tags-input-wrap .tag-item .remove-tag { cursor: pointer; font-size: 14px; line-height: 1; color: var(--accent); margin-left: 2px; }
.tags-input-wrap input { border: none; outline: none; background: transparent; color: var(--text); font-size: 13px; min-width: 80px; flex: 1; font-family: var(--font); }

/* MOBILE SIDEBAR OVERLAY */
@media (max-width: 767px) {
  #sidebar {
    position: fixed; left: 0; top: 0; height: 100%; z-index: 50;
    transform: translateX(-100%);
    padding-bottom: 60px;
    box-shadow: 4px 0 24px rgba(0,0,0,0.4);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar.open + #sidebar-backdrop { display: block; }
  #menu-toggle { display: flex; align-items: center; gap: 4px; padding: 6px 10px; }
  .main-content { padding: 16px 20px 70px; }
  #editor-textarea { padding: 16px 20px 70px; }
  .editor-footer { padding: 8px 20px 65px; }
  #toast-container { bottom: auto; top: 60px; right: 12px; left: 12px; }
  #btn-split { display: none !important; }
}
@media (min-width: 768px) {
  #sidebar { transform: translateX(0) !important; }
  #sidebar-backdrop { display: none !important; }
}

/* MOBILE NAV */
#mobile-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
  background: var(--surface); border-top: 1px solid var(--border);
  height: 50px; padding: 0 4px;
}
#mobile-nav button {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 2px; background: none; border: none; color: var(--text2); font-size: 10px;
  font-family: var(--font); cursor: pointer; transition: color .12s;
}
#mobile-nav button:active { color: var(--accent); }
#mobile-nav button .icon { font-size: 18px; }
@media (max-width: 767px) { #mobile-nav { display: flex; } }
@media (min-width: 768px) { #mobile-nav { display: none; } }

/* Split preview */
#split-preview { display: none; overflow-y: auto; padding: 16px 20px; border-left: 1px solid var(--border); }
#main.split-active { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; }
#main.split-active .main-toolbar { grid-column: 1 / -1; }
#main.split-active #editor-area { display: flex; }
#main.split-active #split-preview { display: block; }
#main.split-active #content-view { display: none; }

/* LIGHT THEME — warm paper tones */
[data-theme="light"] {
  --bg: #fdf6ec;
  --surface: #f5eddc;
  --border: #e5d5b5;
  --text: #3d3226;
  --text2: #8b7355;
  --accent: #c57629;
  --accent-dim: rgba(197, 118, 41, 0.12);
  --danger: #c83e4d;
  --green: #3d8b63;
}
[data-theme="light"] .sidebar-header { background: linear-gradient(180deg, rgba(197,118,41,0.08) 0%, transparent 100%); }
[data-theme="light"] .main-toolbar { background: linear-gradient(180deg, var(--surface) 0%, var(--bg) 100%); }
[data-theme="light"] .note-list-item:hover { background: rgba(197,118,41,0.06); }
[data-theme="light"] .note-list-item.active { background: rgba(197,118,41,0.10); }
[data-theme="light"] .rendered blockquote { background: rgba(197,118,41,0.04); }
[data-theme="light"] .rendered code { background: rgba(197,118,41,0.06); }
[data-theme="light"] .rendered pre code { background: #f0e8d5; }
[data-theme="light"] .rendered th { background: rgba(197,118,41,0.06); }
[data-theme="light"] .btn:hover { background: #ede0cc; }
[data-theme="light"] .btn-icon:hover { background: #ede0cc; }
[data-theme="light"] .btn-primary { color: #fff; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="sidebar-header">
    <h1 style="display:flex;align-items:center;gap:8px;justify-content:space-between">
      <span>🧠 Knowledge Vault</span>
      <button class="btn-icon" id="btn-export" title="导出 JSON">⬇</button>
      <button class="btn-icon" id="btn-file-sync" title="云盘同步">📂</button>
              <button class="btn-icon" id="btn-sync" title="GitHub 同步">🔄</button>
              <button class="btn-icon" id="btn-theme" title="切换主题">🌙</button>
    </h1>
    <button class="btn btn-primary" id="btn-new" style="width:100%">+ 新建笔记</button>
    <input type="text" id="search-input" placeholder="搜索笔记..." autocomplete="off">
  </div>
  <div class="sidebar-body">
    <div class="sidebar-section"><span class="sidebar-section-title">标签</span></div>
    <div class="tag-list" id="tag-list"></div>
    <div class="sidebar-section"><span class="sidebar-section-title" id="note-count">笔记</span></div>
    <div id="note-list"></div>
  </div>
  <div class="sidebar-footer">
    <button class="btn btn-sm" id="btn-select" style="flex:1">☑ 选择</button>
    <button class="btn btn-sm" id="btn-import" style="flex:1">📥 导入</button>
    <button class="btn btn-sm btn-danger hidden" id="btn-batch-delete" style="display:none">🗑 删除已选</button>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>
</aside>
<div id="sidebar-backdrop"></div>

<!-- MAIN -->
<div id="main">
  <div class="main-toolbar">
    <button id="menu-toggle" title="菜单">☰ 笔记</button>
    <input type="text" class="note-title" id="note-title" placeholder="无标题" readonly>
    <button class="btn btn-sm hidden" id="btn-edit" style="display:none">✏️ 编辑</button>
    <button class="btn btn-sm hidden" id="btn-split" style="display:none">🪟 分屏</button>
    <button class="btn btn-sm hidden" id="btn-save" style="display:none">💾 保存</button>
    <button class="btn btn-sm btn-danger hidden" id="btn-delete" style="display:none">🗑</button>
  </div>

  <!-- VIEW MODE -->
  <div class="main-content rendered" id="content-view">
    <div class="empty-state" id="empty-state">
      <span class="icon">📝</span>
      <p>选择或创建一篇笔记开始记录</p>
      <button class="btn btn-primary" id="btn-new-empty">+ 新建笔记</button>
    </div>
  </div>

  <!-- EDIT MODE -->
  <div id="editor-area">
    <textarea id="editor-textarea" placeholder="在此输入 Markdown...&#10;&#10;支持 LaTeX: $E = mc^2$ 或 $$\int_0^1 f(x)dx$$&#10;支持图片拖拽/粘贴&#10;支持代码块: ```python ... ```"></textarea>
    <div class="editor-footer">
      <button class="btn btn-sm" id="btn-tag-edit">🏷 标签</button>
      <span class="save-indicator" id="save-indicator">已保存</span>
    </div>
  </div>

  <div id="split-preview" class="rendered"></div>

  <nav id="mobile-nav">
    <button id="nav-notes"><span class="icon">📋</span>笔记</button>
    <button id="nav-new"><span class="icon">＋</span>新建</button>
    <button id="nav-edit"><span class="icon">✏️</span>编辑</button>
    <button id="nav-delete"><span class="icon">🗑</span>删除</button>
	    <button id="nav-select"><span class="icon">☑</span>选择</button>
  </nav>
</div>

<!-- TAGS MODAL -->
<div class="modal-overlay hidden" id="tag-modal-overlay">
  <div class="modal">
    <h3>编辑标签</h3>
    <div class="tags-input-wrap" id="tags-input-wrap">
      <input type="text" id="tag-input" placeholder="输入标签后按回车..." autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn" id="btn-tag-cancel">取消</button>
      <button class="btn btn-primary" id="btn-tag-done">完成</button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay hidden" id="delete-modal-overlay">
  <div class="modal">
    <h3>删除笔记</h3>
    <p style="color:var(--text2);font-size:14px">确定要删除这条笔记吗？此操作不可撤销。</p>
    <div class="modal-actions">
      <button class="btn" id="btn-delete-cancel">取消</button>
      <button class="btn btn-danger" id="btn-delete-confirm">删除</button>
    </div>
  </div>
</div>

<!-- TOKEN MODAL -->
<div class="modal-overlay hidden" id="token-modal-overlay">
  <div class="modal">
    <h3>GitHub 同步设置</h3>
    <p style="color:var(--text2);font-size:13px">需要 GitHub Personal Access Token，权限勾选 <b>repo</b>。Token 仅存储在本地浏览器。</p>
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=robot-kb-sync" target="_blank" style="font-size:12px">→ 点此创建 Token</a>
    <input type="password" id="token-input" placeholder="ghp_xxxxxxxx" style="margin-top:8px">
    <div class="modal-actions">
      <button class="btn" id="btn-token-cancel">取消</button>
      <button class="btn btn-primary" id="btn-token-save">保存并同步</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/common.min.js"></script>

<script>
// ============================================================================
// MODULE: Utils
// ============================================================================
const uid = () => crypto.randomUUID();
const now = () => new Date().toISOString();
const escapeHTML = (s) => {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
};

// ============================================================================
// MODULE: DB (IndexedDB)
// ============================================================================
const DB = (() => {
  const DB_NAME = 'knowledge_vault';
  const DB_VER = 1;
  let db = null;

  function open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VER);
      req.onupgradeneeded = (e) => {
        const d = e.target.result;
        if (!d.objectStoreNames.contains('notes')) {
          const notes = d.createObjectStore('notes', { keyPath: 'id' });
          notes.createIndex('updated_at', 'updated_at');
          notes.createIndex('tags', 'tags', { multiEntry: true });
        }
        if (!d.objectStoreNames.contains('attachments')) {
          const atts = d.createObjectStore('attachments', { keyPath: 'id' });
          atts.createIndex('note_id', 'note_id');
        }
        if (!d.objectStoreNames.contains('settings')) {
          d.createObjectStore('settings', { keyPath: 'key' });
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = () => reject(req.error);
    });
  }

  function tx(store, mode = 'readonly') {
    return db.transaction(store, mode).objectStore(store);
  }

  function promisify(request) {
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  }

  const notes = {
    getAll: () => new Promise((resolve) => {
      const results = [];
      const req = tx('notes').index('updated_at').openCursor(null, 'prev');
      req.onsuccess = () => {
        const c = req.result;
        if (c) { results.push(c.value); c.continue(); }
        else resolve(results);
      };
      req.onerror = () => resolve(results);
    }),
    getById: (id) => promisify(tx('notes').get(id)),
    put: (note) => promisify(tx('notes', 'readwrite').put(note)),
    delete: (id) => promisify(tx('notes', 'readwrite').delete(id)),
  };

  const attachments = {
    put: (att) => promisify(tx('attachments', 'readwrite').put(att)),
    getById: (id) => promisify(tx('attachments').get(id)),
    getByNoteId: (noteId) => {
      return new Promise((resolve) => {
        const results = [];
        const req = tx('attachments').index('note_id').openCursor(IDBKeyRange.only(noteId));
        req.onsuccess = () => {
          const c = req.result;
          if (c) { results.push(c.value); c.continue(); }
          else resolve(results);
        };
        req.onerror = () => resolve(results);
      });
    },
    delete: (id) => promisify(tx('attachments', 'readwrite').delete(id)),
    getAll: () => {
      return new Promise((resolve) => {
        const results = [];
        const req = tx('attachments').openCursor();
        req.onsuccess = () => {
          const c = req.result;
          if (c) { results.push(c.value); c.continue(); }
          else resolve(results);
        };
        req.onerror = () => resolve(results);
      });
    }
  };

  const settings = {
    get: (key) => promisify(tx('settings').get(key)),
    set: (key, value) => promisify(tx('settings', 'readwrite').put({ key, value })),
  };

  return { open, notes, attachments, settings };
})();

// ============================================================================
// MODULE: Renderer (Markdown + LaTeX + highlight.js)
// ============================================================================
const Renderer = (() => {
  // Protect LaTeX math blocks so marked.js doesn't mangle them
  function protectMath(md) {
    const tokens = [];
    // Protect display math $$...$$
    let i = 0;
    while (i < md.length) {
      if (md[i] === '$' && md[i+1] === '$') {
        const end = md.indexOf('$$', i + 2);
        if (end !== -1) {
          const math = md.slice(i + 2, end);
          tokens.push({ type: 'display', math });
          md = md.slice(0, i) + `\x00D${tokens.length - 1}\x00D` + md.slice(end + 2);
          i += 3; // skip placeholder
          continue;
        }
      }
      if (md[i] === '$' && md[i-1] !== '$' && md[i+1] !== '$' && md[i+1] !== ' ' && md[i+1] !== undefined) {
        // Inline math: $...$ with non-space after opening
        let j = i + 1;
        let found = false;
        while (j < md.length) {
          if (md[j] === '$' && md[j-1] !== ' ' && md[j-1] !== '\\') {
            const math = md.slice(i + 1, j);
            if (math.length > 0) {
              tokens.push({ type: 'inline', math });
              md = md.slice(0, i) + `\x00I${tokens.length - 1}\x00I` + md.slice(j + 1);
              found = true;
              i += 3;
              break;
            }
          }
          j++;
        }
        if (found) continue;
      }
      i++;
    }
    return { md, tokens };
  }

  function restoreMath(html, tokens) {
    let result = html;
    tokens.forEach((t, idx) => {
      const placeholder = t.type === 'display'
        ? `\x00D${idx}\x00D`
        : `\x00I${idx}\x00I`;
      try {
        const rendered = katex.renderToString(t.math, {
          throwOnError: false,
          displayMode: t.type === 'display'
        });
        result = result.replace(placeholder, rendered);
      } catch (e) {
        result = result.replace(placeholder, `<code style="color:var(--danger)">KaTeX Error: ${escapeHTML(t.math)}</code>`);
      }
    });
    return result;
  }

  function embedVideos(html) {
    // YouTube: youtube.com/watch?v=ID or youtu.be/ID
    html = html.replace(
      /<a href="https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)(?:[^"]*)">[^<]*<\/a>/g,
      (_, id) => `<div class="video-wrap"><iframe src="https://www.youtube.com/embed/${id}" allowfullscreen loading="lazy"></iframe></div>`
    );
    // Bilibili: bilibili.com/video/BV...
    html = html.replace(
      /<a href="https?:\/\/(?:www\.)?bilibili\.com\/video\/(BV[\w]+)(?:[^"]*)">[^<]*<\/a>/g,
      (_, bvid) => `<div class="video-wrap"><iframe src="//player.bilibili.com/player.html?bvid=${bvid}" allowfullscreen loading="lazy"></iframe></div>`
    );
    return html;
  }

  function render(md) {
    if (!md) return '<p style="color:var(--text2)">（空内容）</p>';
    const { md: protectedMd, tokens } = protectMath(md);
    let html = marked.parse(protectedMd);
    html = restoreMath(html, tokens);
    html = embedVideos(html);
    return html;
  }

  function highlightCode(root) {
    root.querySelectorAll('pre code').forEach(block => {
      hljs.highlightElement(block);
    });
  }

  // Resolve attachment:uuid references in img tags
  async function resolveAttachments(root, noteId) {
    const imgs = root.querySelectorAll('img');
    for (const img of imgs) {
      const src = img.getAttribute('src');
      if (src && src.startsWith('attachment:')) {
        const attId = src.slice('attachment:'.length);
        try {
          const att = await DB.attachments.getById(attId);
          if (att && att.data) {
            img.src = URL.createObjectURL(att.data);
            if (att.name) img.alt = att.name;
          } else {
            img.alt = '[图片已删除]';
            img.style.opacity = '0.4';
          }
        } catch {
          img.alt = '[加载失败]';
        }
      }
    }
  }

  return { render, highlightCode, resolveAttachments };
})();

// ============================================================================
// MODULE: UI
// ============================================================================
const UI = (() => {
  let state = {
    notes: [],
    activeNoteId: null,
    selectedTag: null,
    searchQuery: '',
    viewMode: 'view', // 'view' | 'edit' | 'split'
    isDirty: false,
    pendingTags: [],
    selectMode: false,
    selectedNotes: new Set(),
  };

  let saveTimer = null;

  // DOM refs
  const $ = (sel) => document.querySelector(sel);
  const $$ = (sel) => document.querySelectorAll(sel);

  function openSidebar() {
    const sb = $('#sidebar');
    sb.classList.add('open');
    const bd = document.getElementById('sidebar-backdrop');
    if (bd && window.innerWidth < 768) bd.style.display = 'block';
    document.querySelectorAll('.rendered .video-wrap iframe').forEach(f => f.style.visibility = 'hidden');
  }
  function closeSidebar() {
    const sb = $('#sidebar');
    sb.classList.remove('open');
    const bd = document.getElementById('sidebar-backdrop');
    if (bd) bd.style.display = 'none';
    document.querySelectorAll('.rendered .video-wrap iframe').forEach(f => f.style.visibility = '');
  }
  function toggleSidebar() {
    if ($('#sidebar').classList.contains('open')) closeSidebar(); else openSidebar();
  }

  function init() {
    // Sidebar events
    $('#btn-new').onclick = () => createNote();
    $('#btn-new-empty')?.addEventListener('click', () => createNote());
    $('#search-input').oninput = (e) => {
      state.searchQuery = e.target.value.toLowerCase();
      renderNoteList();
    };
    $('#btn-export').onclick = () => ExportImport.exportVault();
    $('#btn-file-sync').onclick = () => FileSync.pickFile();
    $('#btn-theme').onclick = () => toggleTheme();
    $('#btn-select').onclick = () => toggleSelectMode();
    $('#btn-batch-delete').onclick = () => batchDelete();
    $('#btn-import').onclick = () => $('#import-file').click();
    $('#import-file').onchange = (e) => ExportImport.importVault(e.target.files[0]);

    // Toolbar events
    $('#menu-toggle').onclick = (e) => {
      e.stopPropagation();
      $('#sidebar').classList.toggle('open');
    };
    $('#btn-edit').onclick = () => enterEditMode();
    $('#btn-split').onclick = () => {
      if (state.viewMode === 'split') exitSplitMode();
      else enterSplitMode();
    };
    $('#btn-save').onclick = () => exitEditMode(true);
    $('#btn-delete').onclick = () => {
      $('#delete-modal-overlay').classList.remove('hidden');
    };
    $('#note-title').oninput = () => {
      state.isDirty = true;
    };

    // Tag modal
    $('#btn-tag-edit').onclick = () => openTagModal();
    $('#btn-tag-cancel').onclick = () => closeTagModal();
    $('#btn-tag-done').onclick = () => closeTagModal();
    $('#tag-input').onkeydown = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTagItem($('#tag-input').value.trim());
        $('#tag-input').value = '';
      }
    };

    // Delete modal
    $('#btn-delete-cancel').onclick = () => $('#delete-modal-overlay').classList.add('hidden');
    $('#btn-delete-confirm').onclick = () => deleteNote();

    // Editor auto-save
    $('#editor-textarea').oninput = () => {
      state.isDirty = true;
      if (saveTimer) clearTimeout(saveTimer);
      saveTimer = setTimeout(() => autoSave(), 2000);
    };

    // Image paste
    $('#editor-textarea').onpaste = (e) => handleImagePaste(e);
    $('#editor-textarea').ondragover = (e) => e.preventDefault();
    $('#editor-textarea').ondrop = (e) => handleImageDrop(e);

    // Backdrop click closes sidebar
    const backdrop = document.getElementById('sidebar-backdrop');
    if (backdrop) backdrop.onclick = () => closeSidebar();

    // Click main to close sidebar on mobile (skip interactive elements)
    $('#main').onclick = (e) => {
      if (e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea')) return;
      if (window.innerWidth < 768 && !state.selectMode) closeSidebar();
    };

    // Mobile nav
    $('#nav-notes').onclick = (e) => {
      e.stopPropagation();
      toggleSidebar();
    };
    $('#nav-new').onclick = (e) => {
      e.stopPropagation();
      createNote();
    };
    $('#nav-edit').onclick = (e) => {
      e.stopPropagation();
      if (!state.activeNoteId) { createNote(); return; }
      if (state.viewMode === 'edit') exitEditMode(true);
      else enterEditMode();
    };
    $('#nav-delete').onclick = (e) => {
      e.stopPropagation();
      if (state.activeNoteId) {
        $('#delete-modal-overlay').classList.remove('hidden');
      }
    };
    $('#nav-select').onclick = (e) => {
      e.stopPropagation();
      if (!state.selectMode) openSidebar();
      toggleSelectMode();
    };

    // Keyboard shortcuts
    document.onkeydown = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); createNote(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); autoSave(); showToast('已保存', 'success'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'e') { e.preventDefault(); if (state.viewMode === 'view') enterEditMode(); else exitEditMode(true); }
    };
  }

  function showToast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    $('#toast-container').appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }

  function setState(partial) {
    Object.assign(state, partial);
  }

  // ---- Note List ----
  function renderNoteList() {
    let filtered = state.notes.filter(n => !n.deleted_at);
    if (state.selectedTag) {
      filtered = filtered.filter(n => n.tags && n.tags.includes(state.selectedTag));
    }
    if (state.searchQuery) {
      filtered = filtered.filter(n =>
        n.title.toLowerCase().includes(state.searchQuery) ||
        (n.tags || []).some(t => t.toLowerCase().includes(state.searchQuery)) ||
        (n.content || '').toLowerCase().includes(state.searchQuery)
      );
    }
    const container = $('#note-list');
    container.className = state.selectMode ? 'selecting' : '';
    container.innerHTML = filtered.map(n => `
      <div class="note-list-item${n.id === state.activeNoteId ? ' active' : ''}" data-id="${n.id}">
        <input type="checkbox" class="select-cb" data-id="${n.id}" ${state.selectedNotes.has(n.id) ? 'checked' : ''}>
        <span>
          <span class="title">${escapeHTML(n.title || '无标题')}</span>
          <span class="meta">${formatDate(n.updated_at)}</span>
        </span>
      </div>
    `).join('') || '<div style="padding:16px;font-size:13px;color:var(--text2)">没有笔记</div>';

    container.querySelectorAll('.note-list-item').forEach(el => {
      if (state.selectMode) {
        el.querySelector('.select-cb').onchange = (e) => {
          e.stopPropagation();
          if (e.target.checked) state.selectedNotes.add(el.dataset.id);
          else state.selectedNotes.delete(el.dataset.id);
          updateBatchDeleteBtn();
        };
      } else {
        el.onclick = () => selectNote(el.dataset.id);
      }
    });

    // Render tags
    renderTagList();
    $('#note-count').textContent = `笔记 (${filtered.length})`;
  }

  function renderTagList() {
    const tagCount = {};
    state.notes.forEach(n => { if (!n.deleted_at) (n.tags || []).forEach(t => { tagCount[t] = (tagCount[t] || 0) + 1; }); });
    const sorted = Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
    const container = $('#tag-list');
    container.innerHTML = sorted.map(([tag, count]) =>
      `<span class="tag${state.selectedTag === tag ? ' active' : ''}" data-tag="${escapeHTML(tag)}">${escapeHTML(tag)} (${count})</span>`
    ).join('');
    container.querySelectorAll('.tag').forEach(el => {
      el.onclick = () => {
        if (state.selectedTag === el.dataset.tag) {
          state.selectedTag = null;
        } else {
          state.selectedTag = el.dataset.tag;
        }
        renderNoteList();
      };
    });
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return `${Math.floor(diff/60000)} 分钟前`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)} 小时前`;
    return d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
  }

  // ---- Note Selection ----
  async function selectNote(id) {
    if (state.isDirty) await autoSave();
    if (state.viewMode === 'edit') exitEditMode(false);
    state.activeNoteId = id;
    state.selectedTag = null;
    const note = state.notes.find(n => n.id === id);
    if (!note) return;

    $('#note-title').value = note.title;
    showToolbarButtons(true, false);
    renderContent(note);
    renderNoteList();
  }

  async function renderContent(note) {
    const view = $('#content-view');
    view.classList.remove('empty-state');
    let html = Renderer.render(note.content);
    view.innerHTML = html;
    Renderer.highlightCode(view);
    await Renderer.resolveAttachments(view, note.id);

    // Render any remaining KaTeX (in case marked produced raw LaTeX in HTML)
    try {
      renderMathInElement(view, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false },
        ],
        throwOnError: false,
      });
    } catch(e) { /* ignore */ }

    $('#empty-state')?.remove();
  }

  // ---- Create Note ----
  async function createNote() {
    if (state.isDirty) await autoSave();
    if (state.viewMode === 'edit') exitEditMode(false);

    const note = {
      id: uid(),
      title: '',
      content: '',
      tags: [],
      pinned: false,
      created_at: now(),
      updated_at: now(),
    };
    await DB.notes.put(note);
    state.notes.unshift(note);
    state.activeNoteId = note.id;
    state.selectedTag = null;

    renderNoteList();
    enterEditMode();
  }

  // ---- Edit Mode ----
  function enterEditMode() {
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (!note) return;
    if (state.viewMode === 'split') {
      $('#main').classList.remove('split-active');
      $('#split-preview').style.display = '';
      if (splitTimer) clearTimeout(splitTimer);
    }
    state.viewMode = 'edit';
    // Close sidebar on mobile when editing to avoid overlap
    if (window.innerWidth < 768) closeSidebar();
    $('#content-view').style.display = 'none';
    $('#editor-area').classList.add('active');
    $('#editor-textarea').value = note.content;
    showToolbarButtons(false, true);
    $('#note-title').removeAttribute('readonly');
    $('#note-title').focus();
    setTimeout(() => $('#editor-textarea').focus(), 50);
  }

  async function exitEditMode(save) {
    if (save || state.isDirty) await autoSave();
    state.viewMode = 'view';
    $('#editor-area').classList.remove('active');
    $('#content-view').style.display = '';
    $('#note-title').setAttribute('readonly', '');
    showToolbarButtons(true, false);
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (note) renderContent(note);
  }

  function showToolbarButtons(viewMode, editMode) {
    const hasNote = !!state.activeNoteId;
    $('#btn-edit').style.display = (viewMode && hasNote) ? '' : 'none';
    $('#btn-save').style.display = (editMode && hasNote) ? '' : 'none';
    $('#btn-delete').style.display = hasNote ? '' : 'none';
    $('#note-title').style.display = hasNote ? '' : 'none';
    $('#btn-split').style.display = hasNote ? '' : 'none';
  }

  let splitTimer = null;
  function enterSplitMode() {
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (!note) return;
    state.viewMode = 'split';
    $('#main').classList.add('split-active');
    $('#editor-area').classList.add('active');
    $('#editor-textarea').value = note.content;
    showToolbarButtons(false, false);
    $('#note-title').removeAttribute('readonly');
    updateSplitPreview();
    $('#editor-textarea').oninput = () => {
      state.isDirty = true;
      if (splitTimer) clearTimeout(splitTimer);
      splitTimer = setTimeout(() => updateSplitPreview(), 300);
    };
  }

  function exitSplitMode() {
    state.viewMode = 'view';
    $('#main').classList.remove('split-active');
    $('#editor-area').classList.remove('active');
    $('#split-preview').style.display = '';
    $('#note-title').setAttribute('readonly', '');
    $('#editor-textarea').oninput = null;
    if (splitTimer) clearTimeout(splitTimer);
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (note) renderContent(note);
    showToolbarButtons(true, false);
  }

  function updateSplitPreview() {
    const md = $('#editor-textarea').value;
    const html = Renderer.render(md);
    const preview = $('#split-preview');
    preview.innerHTML = html;
    Renderer.highlightCode(preview);
  }

  async function autoSave() {
    if (!state.activeNoteId || !state.isDirty) return;
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (!note) return;
    note.title = $('#note-title').value.trim();
    note.content = $('#editor-textarea').value;
    note.updated_at = now();
    await DB.notes.put(note);
    state.isDirty = false;
    Sync.scheduleAutoPush();
    FileSync.write(state.notes.filter(n => !n.deleted_at));
    $('#save-indicator').textContent = '已保存';
    if (state.viewMode === 'edit') {
      $('#save-indicator').textContent = '已保存 ' + new Date().toLocaleTimeString();
      setTimeout(() => { if (!state.isDirty) $('#save-indicator').textContent = '已保存'; }, 1500);
    }
  }

  // ---- Delete Note ----
  async function deleteNote() {
    if (!state.activeNoteId) return;
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (note) {
      note.deleted_at = now();
      note.updated_at = now();
      await DB.notes.put(note);
    }
    state.activeNoteId = null;
    state.isDirty = false;
    $('#delete-modal-overlay').classList.add('hidden');
    $('#content-view').innerHTML = '<div class="empty-state" id="empty-state"><span class="icon">📝</span><p>选择或创建一篇笔记开始记录</p><button class="btn btn-primary" id="btn-new-empty">+ 新建笔记</button></div>';
    $('#btn-new-empty').onclick = () => createNote();
    $('#note-title').value = '';
    showToolbarButtons(false, false);
    $('#editor-area').classList.remove('active');
    $('#content-view').style.display = '';
    $('#note-title').setAttribute('readonly', '');
    state.viewMode = 'view';
    renderNoteList();
    showToast('笔记已删除', 'info');
  }

  // ---- Batch Delete ----
  function toggleSelectMode() {
    state.selectMode = !state.selectMode;
    state.selectedNotes.clear();
    updateBatchDeleteBtn();
    renderNoteList();
  }

  function updateBatchDeleteBtn() {
    const btn = $('#btn-batch-delete');
    btn.style.display = state.selectMode && state.selectedNotes.size > 0 ? '' : 'none';
    btn.textContent = `🗑 删除已选 (${state.selectedNotes.size})`;
  }

  async function batchDelete() {
    if (state.selectedNotes.size === 0) return;
    const count = state.selectedNotes.size;
    const deletedActive = state.selectedNotes.has(state.activeNoteId);
    for (const id of state.selectedNotes) {
      const note = state.notes.find(n => n.id === id);
      if (note) {
        note.deleted_at = now();
        note.updated_at = now();
        await DB.notes.put(note);
      }
    }
    state.selectedNotes.clear();
    state.selectMode = false;
    if (deletedActive) state.activeNoteId = null;
    updateBatchDeleteBtn();
    renderNoteList();
    showToast(`已删除 ${count} 条笔记`, 'info');
  }

  // ---- Image Handling ----
  async function handleImagePaste(e) {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        await saveAttachment(blob);
      }
    }
  }

  async function handleImageDrop(e) {
    e.preventDefault();
    const files = e.dataTransfer?.files;
    if (!files) return;
    for (const file of files) {
      if (file.type.startsWith('image/')) {
        await saveAttachment(file);
      }
    }
  }

  async function saveAttachment(file) {
    if (!state.activeNoteId) return;
    const attId = uid();
    const att = {
      id: attId,
      note_id: state.activeNoteId,
      name: file.name || 'image.png',
      mime_type: file.type,
      data: file,
      created_at: now(),
      updated_at: now(),
    };
    await DB.attachments.put(att);

    // Insert markdown reference at cursor
    const mdRef = `![${att.name}](attachment:${attId})`;
    const textarea = $('#editor-textarea');
    const start = textarea.selectionStart;
    const end = textarea.selectionEnd;
    textarea.value = textarea.value.slice(0, start) + mdRef + '\n' + textarea.value.slice(end);
    textarea.selectionStart = textarea.selectionEnd = start + mdRef.length + 1;
    textarea.focus();
    state.isDirty = true;
    $('#save-indicator').textContent = '图片已插入';
    showToast('图片已插入', 'success');
  }

  // ---- Tag Modal ----
  function openTagModal() {
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (!note) return;
    state.pendingTags = [...(note.tags || [])];
    renderTagItems();
    $('#tag-modal-overlay').classList.remove('hidden');
    setTimeout(() => $('#tag-input').focus(), 100);
  }

  function closeTagModal() {
    $('#tag-modal-overlay').classList.add('hidden');
    const note = state.notes.find(n => n.id === state.activeNoteId);
    if (note) {
      note.tags = [...state.pendingTags];
      note.updated_at = now();
      DB.notes.put(note);
      state.isDirty = true;
      renderNoteList();
    }
  }

  function addTagItem(tag) {
    if (tag && !state.pendingTags.includes(tag)) {
      state.pendingTags.push(tag);
      renderTagItems();
    }
  }

  function removeTagItem(tag) {
    state.pendingTags = state.pendingTags.filter(t => t !== tag);
    renderTagItems();
  }

  function renderTagItems() {
    const wrap = $('#tags-input-wrap');
    const input = $('#tag-input');
    wrap.querySelectorAll('.tag-item').forEach(el => el.remove());
    state.pendingTags.forEach(tag => {
      const span = document.createElement('span');
      span.className = 'tag-item';
      span.innerHTML = `${escapeHTML(tag)}<span class="remove-tag" data-tag="${escapeHTML(tag)}">&times;</span>`;
      span.querySelector('.remove-tag').onclick = () => removeTagItem(tag);
      wrap.insertBefore(span, input);
    });
  }

  // ---- Theme ----
  async function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    const btn = $('#btn-theme');
    if (btn) btn.textContent = theme === 'light' ? '☀️' : '🌙';
    try { await DB.settings.set('theme', theme); } catch (e) { /* DB not ready */ }
  }

  async function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme');
    applyTheme(current === 'light' ? 'dark' : 'light');
  }

  async function initTheme() {
    try {
      const s = await DB.settings.get('theme');
      if (s?.value) applyTheme(s.value);
    } catch (e) { /* default dark */ }
  }

  return { init, state: () => state, setState, renderNoteList, showToast, selectNote, createNote, initTheme };
})();

// ============================================================================
// MODULE: Export / Import
// ============================================================================
const ExportImport = (() => {
  async function exportVault() {
    try {
      const notes = await DB.notes.getAll();
      const atts = await DB.attachments.getAll();
      // Convert blob data to base64 for export
      const attsExport = await Promise.all(atts.map(async (a) => {
        let data64 = null;
        if (a.data) {
          data64 = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.readAsDataURL(a.data);
          });
        }
        return { ...a, data: data64 };
      }));

      const payload = { version: 1, exported_at: now(), notes, attachments: attsExport };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `knowledge-vault-${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      UI.showToast(`已导出 ${notes.length} 条笔记`, 'success');
    } catch (e) {
      UI.showToast('导出失败: ' + e.message, 'error');
    }
  }

  async function importVault(file) {
    if (!file) return;
    try {
      const text = await new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsText(file);
      });
      const payload = JSON.parse(text);
      if (!payload.version || !payload.notes) throw new Error('无效的备份文件');

      for (const note of payload.notes) {
        await DB.notes.put(note);
      }
      if (payload.attachments) {
        for (const att of payload.attachments) {
          let blobData = null;
          if (att.data && typeof att.data === 'string' && att.data.startsWith('data:')) {
            const resp = await fetch(att.data);
            blobData = await resp.blob();
          }
          await DB.attachments.put({ ...att, data: blobData });
        }
      }

      // Reload
      const state = UI.state();
      state.notes = await DB.notes.getAll();
      state.activeNoteId = null;
      state.isDirty = false;
      UI.renderNoteList();
      // Reset view
      const contentView = document.querySelector('#content-view');
      contentView.innerHTML = '<div class="empty-state" id="empty-state"><span class="icon">📝</span><p>选择或创建一篇笔记开始记录</p><button class="btn btn-primary" id="btn-new-empty">+ 新建笔记</button></div>';
      document.querySelector('#btn-new-empty').addEventListener('click', () => UI.createNote());
      document.querySelector('#note-title').value = '';
      UI.showToast(`已导入 ${payload.notes.length} 条笔记`, 'success');
    } catch (e) {
      UI.showToast('导入失败: ' + e.message, 'error');
    }
    // Reset file input
    document.querySelector('#import-file').value = '';
  }

  return { exportVault, importVault };
})();

// ============================================================================
// MODULE: Sync (GitHub API)
// ============================================================================
const Sync = (() => {
  const REPO = 'GuoROS/robot-kb';
  const PATH = 'data.json';

  function b64enc(s) {
    // Unicode-safe base64
    const bytes = new TextEncoder().encode(s);
    let bin = '';
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin);
  }
  function b64dec(s) {
    const bin = atob(s);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  async function getToken() {
    try {
      const s = await DB.settings.get('github_token');
      return s?.value || null;
    } catch (e) { return null; }
  }

  async function saveToken(t) {
    await DB.settings.set('github_token', t);
  }

  function showTokenModal() {
    document.querySelector('#token-modal-overlay').classList.remove('hidden');
    document.querySelector('#token-input').focus();
  }

  // Fetch data.json from GitHub. Returns { notes, attachments, _sha } or null.
  async function fetchRemote(token) {
    const url = `https://api.github.com/repos/${REPO}/contents/${PATH}?t=${Date.now()}`;
    const resp = await fetch(url, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (resp.status === 404) return null;
    if (!resp.ok) throw new Error(`GitHub API: ${resp.status} ${resp.statusText}`);
    const file = await resp.json();
    const payload = JSON.parse(b64dec(file.content));
    payload._sha = file.sha;
    return payload;
  }

  // Push data.json to GitHub
  async function pushRemote(token, payload) {
    const body = {
      message: 'sync',
      content: b64enc(JSON.stringify(payload, null, 2)),
    };
    if (payload._sha) body.sha = payload._sha;

    const url = `https://api.github.com/repos/${REPO}/contents/${PATH}`;
    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        Authorization: `token ${token}`,
        Accept: 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`GitHub API: ${resp.status} ${resp.statusText}`);
  }

  // Merge by updated_at: later wins. Exported so FileSync can use it.
  function mergeNotes(localItems, remoteItems) {
    const map = {};
    for (const item of localItems) map[item.id] = item;
    for (const r of remoteItems) {
      const existing = map[r.id];
      if (!existing) { map[r.id] = r; continue; }
      // If either side is soft-deleted, propagate deletion
      if (r.deleted_at || existing.deleted_at) {
        const dA = r.deleted_at ? new Date(r.deleted_at) : new Date(0);
        const dB = existing.deleted_at ? new Date(existing.deleted_at) : new Date(0);
        map[r.id] = dA >= dB ? r : existing;
        continue;
      }
      // Otherwise, later updated_at wins
      if (new Date(r.updated_at) > new Date(existing.updated_at)) {
        map[r.id] = r;
      }
    }
    return Object.values(map);
  }

  // Show modal for token input/reconfiguration
  async function showSyncModal() {
    const existing = await getToken();
    const input = document.querySelector('#token-input');
    input.value = existing || '';
    document.querySelector('#token-modal-overlay').classList.remove('hidden');
    input.focus();
  }

  async function doSync(token) {
    UI.showToast('正在同步...', 'info');

    try {
      // 1. Fetch remote (notes only, no attachments for speed)
      const remote = await fetchRemote(token);

      // 2. Get local notes
      const localNotes = await DB.notes.getAll();

      // 3. Merge notes
      const mergedNotes = remote
        ? mergeNotes(localNotes, remote.notes || [])
        : localNotes;

      const payload = {
        version: 1,
        synced_at: now(),
        notes: mergedNotes,
      };
      if (remote?._sha) payload._sha = remote._sha;

      // 4. Push merged data (notes only, lightweight)
      await pushRemote(token, payload);

      // 5. Update local DB with merged notes
      for (const note of mergedNotes) {
        await DB.notes.put(note);
      }

      // 6. Reload without clearing active note
      const state = UI.state();
      const savedNoteId = state.activeNoteId;
      state.notes = await DB.notes.getAll();
      state.isDirty = false;
      UI.renderNoteList();
      if (savedNoteId && state.notes.find(n => n.id === savedNoteId && !n.deleted_at)) {
        UI.selectNote(savedNoteId);
      }
      const activeCount = mergedNotes.filter(n => !n.deleted_at).length;
      UI.showToast(`同步完成 — ${activeCount} 条笔记`, 'success');
    } catch (e) {
      const msg = e.message;
      if (msg.includes('401')) {
        UI.showToast('Token 无效，请重新填写', 'error');
        saveToken('');
        showSyncModal();
      } else if (msg.includes('404')) {
        UI.showToast('同步文件不存在，将自动创建', 'info');
      } else if (msg.includes('NetworkError') || msg.includes('Failed to fetch')) {
        UI.showToast('网络连接失败，请检查是否需科学上网', 'error');
      } else {
        UI.showToast('同步失败: ' + msg, 'error');
      }
      console.error('Sync error:', e);
    }
  }

  // Token modal events
  function init() {
    document.querySelector('#btn-sync').onclick = () => showSyncModal();
    document.querySelector('#btn-token-cancel').onclick = () => {
      document.querySelector('#token-modal-overlay').classList.add('hidden');
    };
    document.querySelector('#btn-token-save').onclick = async () => {
      const token = document.querySelector('#token-input').value.trim();
      if (!token) return;
      await saveToken(token);
      document.querySelector('#token-modal-overlay').classList.add('hidden');
      doSync(token);
    };
    document.querySelector('#token-input').onkeydown = (e) => {
      if (e.key === 'Enter') document.querySelector('#btn-token-save').click();
    };
  }

  // Auto-pull on load (silent, no toasts)
  async function autoPull() {
    const token = await getToken();
    if (!token) return;
    try {
      const remote = await fetchRemote(token);
      if (!remote) return;
      const localNotes = await DB.notes.getAll();
      const merged = mergeNotes(localNotes, remote.notes || []);
      for (const note of merged) await DB.notes.put(note);
      const s = UI.state();
      s.notes = await DB.notes.getAll();
      UI.renderNoteList();
    } catch (e) { console.error('Sync autoPull failed:', e); }
  }

  // Auto-push after save (debounced, silent)
  let pushTimer = null;
  function scheduleAutoPush() {
    if (pushTimer) clearTimeout(pushTimer);
    pushTimer = setTimeout(async () => {
      const token = await getToken();
      if (!token) return;
      try {
        const remote = await fetchRemote(token);
        const localNotes = await DB.notes.getAll();
        const merged = mergeNotes(localNotes, remote?.notes || []);
        const payload = { version: 1, synced_at: now(), notes: merged };
        if (remote?._sha) payload._sha = remote._sha;
        await pushRemote(token, payload);
      } catch (e) { console.error('Sync autoPush failed:', e); }
    }, 2000);
  }

  init();

  return { sync: () => showSyncModal(), showTokenModal: showSyncModal, autoPull, scheduleAutoPush, mergeNotes };
})();

// ============================================================================
// MODULE: FileSync (Cloud Drive via File System Access API)
// ============================================================================
const FileSync = (() => {
  const HANDLE_KEY = 'file_sync_handle';

  function ok() {
    return typeof window.showOpenFilePicker === 'function';
  }

  async function hasHandle() {
    if (!ok()) return false;
    try { const s = await DB.settings.get(HANDLE_KEY); return !!s?.value; } catch { return false; }
  }

  async function pickFile() {
    if (!ok()) { UI.showToast('当前浏览器不支持文件同步，请使用 Chrome 或 Edge', 'error'); return null; }
    try {
      const [h] = await window.showOpenFilePicker({
        types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }],
        mode: 'readwrite',
        startIn: 'documents'
      });
      await DB.settings.set(HANDLE_KEY, h);
      UI.showToast('已绑定云盘文件，自动同步已开启', 'success');
      return h;
    } catch (e) {
      if (e.name !== 'AbortError') console.error('FileSync pickFile:', e);
      return null;
    }
  }

  async function getHandle() {
    try { const s = await DB.settings.get(HANDLE_KEY); return s?.value || null; } catch { return null; }
  }

  async function read() {
    if (!ok()) return null;
    const h = await getHandle();
    if (!h) return null;
    try {
      const file = await h.getFile();
      const text = await file.text();
      const payload = JSON.parse(text);
      if (!payload.version || !payload.notes) return null;
      return payload;
    } catch (e) { console.error('FileSync read:', e); return null; }
  }

  async function write(notes) {
    if (!ok()) return;
    const h = await getHandle();
    if (!h) return;
    try {
      const writable = await h.createWritable();
      const payload = { version: 1, synced_at: now(), notes };
      await writable.write(JSON.stringify(payload, null, 2));
      await writable.close();
    } catch (e) { console.error('FileSync write:', e); }
  }

  async function autoSync() {
    if (!ok()) return;
    const remote = await read();
    if (!remote || !remote.notes) return;
    const localNotes = await DB.notes.getAll();
    const merged = Sync.mergeNotes(localNotes, remote.notes);
    const s = UI.state();
    if (s.isDirty) {
      for (const note of merged) {
        if (note.id !== s.activeNoteId) await DB.notes.put(note);
      }
    } else {
      for (const note of merged) await DB.notes.put(note);
    }
    const fresh = await DB.notes.getAll();
    UI.setState({ notes: fresh });
    UI.renderNoteList();
  }

  return { ok, hasHandle, pickFile, read, write, autoSync };
})();

// ============================================================================
// MODULE: App (Bootstrap)
// ============================================================================
const App = (() => {
  async function init() {
    try {
      await DB.open();
    } catch (e) {
      console.error('IndexedDB 不可用:', e);
      UI.showToast('数据库不可用，数据将无法保存', 'error');
    }

    const notes = await DB.notes.getAll();
    UI.setState({ notes });
    await UI.initTheme();
    UI.init();
    UI.renderNoteList();
    Sync.autoPull();
    FileSync.autoSync();

    // Pull from cloud/file when user switches back to this tab
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) {
        FileSync.autoSync();
        Sync.autoPull();
      }
    });

    // Push on tab close (best-effort for GitHub sync)
    window.addEventListener('beforeunload', () => {
      const s = UI.state();
      const allNotes = [...s.notes];
      if (allNotes.length > 0) FileSync.write(allNotes.filter(n => !n.deleted_at));
    });

    // Hide editor area initially
    document.querySelector('#editor-area').classList.remove('active');
  }
  return { init };
})();

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
